name: Discord Bot CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify python compilation
      run: |
        python -m py_compile bot.py
        python -m py_compile cogs/general.py
        python -m py_compile cogs/voice.py
        python -m py_compile cogs/moderation.py
        python -m py_compile utils/logger.py
        python -m py_compile utils/keep_alive.py
